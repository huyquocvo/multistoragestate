name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env: #define your environment variables
      BASE_URL: ${{vars.BASE_URL}}
      ADMIN_USERNAME: ${{secrets.ADMIN_USERNAME}}
      ADMIN_PASSWORD: ${{secrets.ADMIN_PASSWORD}}
      CUSTOMER_01_USERNAME: ${{secrets.CUSTOMER_01_USERNAME}}
      CUSTOMER_01_PASSWORD: ${{secrets.CUSTOMER_01_PASSWORD}}
      CUSTOMER_02_USERNAME: ${{secrets.CUSTOMER_02_USERNAME}}
      CUSTOMER_02_PASSWORD: ${{secrets.CUSTOMER_02_PASSWORD}}
      CUSTOMER_03_USERNAME: ${{secrets.CUSTOMER_03_USERNAME}}
      CUSTOMER_03_PASSWORD: ${{secrets.CUSTOMER_03_PASSWORD}}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
   
