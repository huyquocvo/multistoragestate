name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: 'Create env file'
      run: |
          echo "UI_URL=https://practicesoftwaretesting.com" >> .env
          echo "CUSTOMER_02_USERNAME=customer2@practicesoftwaretesting.com" >> .env
          echo "CUSTOMER_02_PASSWORD=welcome01" >> .env
          echo "ADMIN_USERNAME=admin@practicesoftwaretesting.com" >> .env
          echo "ADMIN_PASSWORD=welcome01" >> .env
          cat .env
